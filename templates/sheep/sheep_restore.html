{% extends 'base.html' %}

{% block title %}Vrati grlo u aktivna{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h2 class="text-success mb-3">
                    Vrati grlo u aktivna
                </h2>

                <p>
                    Želiš li vratiti grlo
                    <strong>{{ animal.eid_number }}</strong>
                    u aktivna grla?
                </p>

                <form method="post">
                    {% csrf_token %}

                    <button class="btn btn-success">
                        Da, vrati
                    </button>

                    <a href="{% url 'sheep_archive' %}" class="btn btn-outline-secondary">
                        Odustani
                    </a>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
