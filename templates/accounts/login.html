{% extends 'base.html' %}

{% block title %}Prijava | SheepTrackAI{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h2 class="mb-4 text-success">Prijava</h2>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100">
                        Prijavi se
                    </button>
                </form>

                <p class="mt-3 text-center">
                    Nemaš račun?
                    <a href="{% url 'register' %}">Registriraj se</a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}
